# Blueprint Render — deploiement mono-service de "Carnet Medical".
# Un seul service web : Express sert l'API (/api/*) ET le frontend React compile.
# La base SQLite vit sur un disque persistant pour survivre aux redeploiements.
#
# Deploiement : poussez ce repo sur GitHub, puis dans Render :
#   New + -> Blueprint -> selectionnez le repo. Render lit ce fichier.
services:
  - type: web
    name: carnet-medical
    runtime: node
    plan: starter            # "free" possible, mais le disque persistant exige un plan payant
    region: frankfurt        # au plus pres des utilisateurs ; ajustez si besoin
    branch: main
    # Installe le frontend, le compile, puis installe le backend.
    # npm install (et non npm ci) pour que npm resolve la bonne dependance
    # native selon la plateforme (rollup/esbuild) — le package-lock genere sous
    # macOS ne contient pas le binaire Linux, ce qui ferait echouer `npm ci`.
    # --include=dev : force l'installation des devDependencies (vite, plugin react)
    # meme si NODE_ENV=production, sinon `vite build` echoue (vite: not found).
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    # Amorcage de production (cree/maj le compte owner, supprime les comptes demo),
    # puis demarrage de l'API. Aucune donnee fictive n'est inseree.
    startCommand: cd backend && npm run bootstrap && npm start
    healthCheckPath: /api/health
    # Disque persistant pour le fichier SQLite (sinon perdu a chaque deploiement).
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Chemin de la base sur le disque persistant (lu par backend/src/db.js).
      - key: DB_PATH
        value: /var/data/data.sqlite
      # Secret JWT genere automatiquement et garde par Render (ne PAS committer).
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      # Mono-service : le front est servi sur la meme origine, CORS non requis.
      - key: CORS_ORIGIN
        value: "*"
      # --- Compte proprietaire (owner) ---
      # Valeurs a saisir dans le dashboard Render (jamais dans le code / git).
      # sync: false => Render demande la valeur et la garde comme secret.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NOM
        sync: false
      # Mettre a 1 le temps d'un deploiement pour reinitialiser le mot de passe owner.
      - key: ADMIN_RESET_PASSWORD
        sync: false
